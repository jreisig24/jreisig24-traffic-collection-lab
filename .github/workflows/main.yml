name: Traffic Data Collector

on:
  schedule:
    # Runs at 8:00 AM, 12:00 PM, and 5:00 PM Oregon time (PDT)
    - cron: '0 15,19,0 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run collection script
        run: python collect.py

      - name: Save images to repo
        run: |
          git config --global user.name "TrafficBot"
          git config --global user.email "bot@github.com"
          git add *.jpg
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated Traffic Capture"
          git push
